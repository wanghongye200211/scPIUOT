experiment:
  name: demo_dataset
  run_name: piuot_run

device:
  type: mps

seed: 0

data:
  path: piuot/input/input.h5ad
  embedding_key: null
  time_key: time_bin
  raw_time_key: t
  state_key: consensus_cluster
  fate_key: phenotype_facs
  label: dataset

reduction:
  method: gae
  epoch: 15

selection:
  checkpoint_epoch: auto

training:
  train_epochs: 2000
  train_lr: 0.005
  lambda_ot: 1.0
  lambda_hjb: 0.05
  lambda_density: 0.05
  lambda_action: 0.01
  lambda_mass: 0.1
  growth_mode: bounded
  growth_scale: 0.05
  hjb_growth_coeff: 2.0
  solver_dt: 0.1
  stage_transition_epoch: 200
  stage2_lr: 0.0005
  constraint_start_epoch: 230
  constraint_ramp_epochs: 30
  global_mass_start_epoch: 200
  global_mass_ramp_epochs: 0
  local_mass_loss_mode: absolute_l2
  detach_ot_weights: true
  evaluate_n: 4000
  ns: 2000
